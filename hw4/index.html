<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW4 - Ajax & Pagination & Search</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        #searchInput {
            width: 300px;
        }
        .pagination-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="header-row">
            <h1>景點觀光展覽資訊</h1>
            <!-- Search field with onchange event as per Page 56 -->
            <input type="text" id="searchInput" class="form-control" placeholder="搜尋名稱..." onchange="searchData()">
        </div>

        <table id="csie" class="table table-striped table-hover table-bordered">
            <thead class="table-success">
                <tr>
                    <th>名稱</th>
                    <th>地點</th>
                    <th>票價</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will be inserted here -->
            </tbody>
        </table>

        <!-- Pagination Controls as per Page 57 -->
        <div class="pagination-container">
            <button class="btn btn-outline-primary" onclick="prevPage()">上一頁</button>
            <span id="pageInfo">1 / 1 頁</span>
            <button class="btn btn-outline-primary" onclick="nextPage()">下一頁</button>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
